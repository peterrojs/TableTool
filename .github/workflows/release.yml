name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' 'Table Tool/Info.plist')"
          if [[ "$RELEASE_TAG" != "v$version" ]]; then
            echo "Tag $RELEASE_TAG does not match CFBundleShortVersionString ($version)." >&2
            exit 1
          fi

      - name: Build and test
        run: |
          set -euo pipefail
          xcodebuild -project "Table Tool.xcodeproj" -scheme "Table Tool" \
            -destination 'platform=macOS' test \
            CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO

      - name: Build release app
        run: |
          set -euo pipefail
          xcodebuild -project "Table Tool.xcodeproj" -scheme "Table Tool" \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            ARCHS="arm64 x86_64" ONLY_ACTIVE_ARCH=NO \
            CODE_SIGNING_ALLOWED=NO build

      - name: Package release
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          app="build/DerivedData/Build/Products/Release/Table Tool.app"
          artifact="TableTool-${RELEASE_TAG#v}-macOS.zip"
          test -d "$app"
          codesign --force --deep --sign - \
            --entitlements "Table Tool/Table Tool.entitlements" "$app"
          codesign --verify --deep --strict "$app"
          ditto -c -k --sequesterRsrc --keepParent "$app" "$artifact"
          shasum -a 256 "$artifact" > "$artifact.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          notes_args=(--generate-notes)
          previous_tag="$(git describe --tags --abbrev=0 "$RELEASE_TAG^" 2>/dev/null || true)"
          if [[ -n "$previous_tag" ]]; then
            notes_args+=(--notes-start-tag "$previous_tag")
          fi
          gh release create "$RELEASE_TAG" \
            "TableTool-${version}-macOS.zip" \
            "TableTool-${version}-macOS.zip.sha256" \
            --verify-tag \
            --title "Table Tool $version" \
            "${notes_args[@]}"
