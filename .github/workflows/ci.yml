name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    # macos-26 provides SDK parity with newer local Xcode/macOS builds.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build and test
        run: |
          xcodebuild -project "Table Tool.xcodeproj" -scheme "Table Tool" \
            -destination 'platform=macOS' test \
            CODE_SIGNING_ALLOWED=NO ONLY_ACTIVE_ARCH=NO
